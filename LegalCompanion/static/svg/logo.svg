<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Scales of Justice Base -->
  <g fill="none" stroke="#0d6efd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Balance Beam -->
    <line x1="10" y1="26" x2="70" y2="26" />
    <!-- Center Pillar -->
    <line x1="40" y1="12" x2="40" y2="68" />
    <!-- Base -->
    <rect x="25" y="68" width="30" height="5" rx="2" />
    
    <!-- Left Scale -->
    <circle cx="20" cy="36" r="10" />
    <line x1="20" y1="26" x2="20" y2="16" />
    
    <!-- Right Scale -->
    <circle cx="60" cy="36" r="10" />
    <line x1="60" y1="26" x2="60" y2="16" />
    
    <!-- Top Piece -->
    <circle cx="40" cy="12" r="4" />
  </g>
  
  <!-- Book/Document on left scale -->
  <g fill="#0d6efd" stroke="#0d6efd" stroke-width="1">
    <rect x="15" y="31" width="10" height="8" rx="1" />
    <line x1="17" y1="34" x2="23" y2="34" stroke-width="1" />
    <line x1="17" y1="36" x2="21" y2="36" stroke-width="1" />
  </g>
  
  <!-- Paragraph symbols on right scale -->
  <g fill="#0d6efd" stroke="#0d6efd" stroke-width="1">
    <path d="M57,32 h4 q2,0 2,2 v2 q0,2 -2,2 h-2 v4 h-2 v-10 M57,38 h2" />
    <path d="M63,32 h-2 q-2,0 -2,2 v6 h2 v-6 h2" />
  </g>
  
  <!-- LEX text -->
  <text x="30" y="55" font-family="Arial, sans-serif" font-weight="bold" font-size="8" fill="#0d6efd">LEXASSIST</text>
</svg>
